<!doctype html>
<html lang="uk">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#184e77" />
    <title>Трекер завдань</title>
    <script>
      // Run before the stylesheet is painted so returning users never see the access form flash.
      try {
        if (
          localStorage.getItem("simple-task-pwa-access-granted") === "true" ||
          window.AndroidAccess?.hasAccess?.() === true
        ) {
          document.documentElement.classList.add("access-already-granted");
        }
      } catch (_) {}
    </script>
    <link rel="manifest" href="manifest.json?v=36" />
    <link rel="icon" href="icon-512.png?v=27" />
    <link rel="apple-touch-icon" href="icon-192.png?v=27" />
    <link rel="stylesheet" href="styles.css?v=63" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Таски" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  </head>
  <body class="access-locked">
    <section class="access-screen" id="accessScreen" aria-labelledby="accessTitle">
      <form class="access-card" id="accessForm">
        <span class="access-lock-icon" aria-hidden="true">⌁</span>
        <h1 id="accessTitle">Доступ до тасок</h1>
        <p>Введіть код, щоб відкрити список завдань.</p>
        <label class="access-label" for="accessCode">Код доступу</label>
        <input id="accessCode" type="password" inputmode="numeric" autocomplete="one-time-code" maxlength="8" pattern="[0-9]*" placeholder="Введіть код" required />
        <p class="access-error" id="accessError" role="alert" aria-live="polite"></p>
        <button class="access-submit" type="submit">Відкрити</button>
      </form>
    </section>
    <main class="app-shell">
      <section class="content" id="tasksPanel" aria-labelledby="tasksTab">
        <div class="section-heading">
          <div class="task-filter-tabs" role="tablist" aria-label="Фільтр тасок">
            <button class="task-filter-tab active" type="button" role="tab" data-task-filter="all" aria-selected="true">Всі</button>
            <button class="task-filter-tab" type="button" role="tab" data-task-filter="urgent" aria-selected="false">Термінові</button>
            <button class="task-filter-tab" type="button" role="tab" data-task-filter="buy" aria-selected="false">Купити</button>
          </div>
          <span id="taskCount">0</span>
        </div>
        <ul class="task-list" id="taskList"></ul>
      </section>

      <section class="content" id="trashPanel" aria-labelledby="trashTab" hidden>
        <div class="section-heading">
          <h2>Обов’язкові</h2>
          <span id="trashCount">0</span>
        </div>
        <ul class="task-list" id="trashList"></ul>
      </section>
    </main>

    <div class="modal-backdrop" id="taskModal" role="dialog" aria-modal="true" aria-labelledby="taskModalTitle" hidden>
      <section class="composer modal-card" aria-label="Додати нове завдання">
        <div class="modal-heading">
          <h2 id="taskModalTitle">Нове завдання</h2>
          <button class="modal-close-button" id="closeTaskModalButton" type="button" aria-label="Закрити">×</button>
        </div>
        <label class="input-label" for="taskInput">Що потрібно зробити?</label>
        <div class="input-row">
          <input id="taskInput" type="text" placeholder="Наприклад: купити каву" autocomplete="off" />
          <button class="icon-button mic-button" id="micButton" type="button" aria-label="Диктувати завдання" title="Диктувати завдання">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Z" />
              <path d="M19 11a7 7 0 0 1-14 0" />
              <path d="M12 18v3" />
              <path d="M8 21h8" />
            </svg>
          </button>
        </div>
        <label class="reminder-toggle" for="newReminderEnabled">
          <input id="newReminderEnabled" type="checkbox" />
          Додати нагадування
        </label>
        <div class="new-reminder-options" id="taskReminder" hidden>
          <div class="new-reminder-picker">
            <select id="newReminderDay" aria-label="День"></select>
            <select id="newReminderMonth" aria-label="Місяць"></select>
            <select id="newReminderYear" aria-label="Рік"></select>
            <select id="newReminderHour" aria-label="Година"></select>
            <select id="newReminderMinute" aria-label="Хвилини"></select>
          </div>
          <label class="input-label repeat-label" for="taskRepeat">Повторювати</label>
          <select class="repeat-select" id="taskRepeat" aria-label="Повторювати">
            <option value="none">Не повторювати</option>
            <option value="daily">Щодня</option>
            <option value="weekly-monday">Щопонеділка</option>
            <option value="monthly-20">Кожного 20 числа</option>
          </select>
        </div>
        <p class="voice-status" id="voiceStatus" role="status" aria-live="polite"></p>
        <button class="modal-submit-button" id="submitTaskButton" type="button">Додати таску</button>
      </section>
    </div>

    <nav class="bottom-tabs" aria-label="Головна навігація">
      <button class="tab-button active" id="tasksTab" type="button" aria-controls="tasksPanel" aria-selected="true">
        <span class="tab-icon" aria-hidden="true">✓</span>
        <span>Таски</span>
      </button>
      <button class="nav-mic-button" id="navMicButton" type="button" aria-label="Додати голосом. Подвійний тап для ручного вводу" title="Додати голосом. Подвійний тап для ручного вводу">
        <svg aria-hidden="true" viewBox="0 0 24 24">
          <path d="M12 14a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v5a3 3 0 0 0 3 3Z" />
          <path d="M19 11a7 7 0 0 1-14 0" />
          <path d="M12 18v3" />
          <path d="M8 21h8" />
        </svg>
      </button>
      <button class="tab-button" id="trashTab" type="button" aria-controls="trashPanel" aria-selected="false">
        <span class="tab-icon" aria-hidden="true">!</span>
        <span>Обов’язкові</span>
      </button>
    </nav>

    <script src="app.js?v=83" defer></script>
  </body>
</html>
